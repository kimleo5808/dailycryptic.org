name: Update Strands Puzzle

on:
  schedule:
    # Run at 05:30 UTC daily (12:30 AM ET, 30 min after NYT reset)
    - cron: "30 5 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch today's puzzle
        id: fetch
        run: node scripts/fetch-strands.mjs
        continue-on-error: true

      - name: Retry after 30 minutes if failed
        if: steps.fetch.outcome == 'failure'
        run: |
          echo "First attempt failed. Waiting 30 minutes..."
          sleep 1800
          node scripts/fetch-strands.mjs
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/strands/puzzles.json data/strands/boards.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/strands/puzzles.json data/strands/boards.json
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "data: update strands puzzle for ${DATE}"
          git push

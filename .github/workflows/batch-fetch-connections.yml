name: Batch Fetch Connections Puzzles

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
      end_date:
        description: "End date (YYYY-MM-DD)"
        required: true

jobs:
  batch-fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Batch fetch puzzles
        run: node scripts/fetch-connections.mjs --batch ${{ github.event.inputs.start_date }} ${{ github.event.inputs.end_date }}

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/connections/puzzles.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            COUNT=$(node -e "const d=require('./data/connections/puzzles.json'); console.log(d.puzzles.length)")
            echo "count=$COUNT" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/connections/puzzles.json
          git commit -m "data: batch fetch connections puzzles ${{ github.event.inputs.start_date }} to ${{ github.event.inputs.end_date }} (total: ${{ steps.changes.outputs.count }})"
          git push

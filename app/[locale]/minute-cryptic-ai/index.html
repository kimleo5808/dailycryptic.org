    <meta charset="UTF-8" />

    <title>Minute Cryptic AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['Merriweather', 'serif'],
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              brand: {
                bg: '#b8d8fa', // Light blue background from screenshot
                card: '#ffffff',
                text: '#1e293b',
                accent: '#fbbf24', // Yellow for hints
                primary: '#60a5fa', // Blue for check
                success: '#4ade80',
                error: '#f87171',
              }
            },
            boxShadow: {
              'hard': '4px 4px 0px 0px rgba(0,0,0,0.15)',
              'hard-sm': '2px 2px 0px 0px rgba(0,0,0,0.15)',
            }
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #b8d8fa;
        overscroll-behavior: none;
      }
      .wiggle {
        animation: wiggle 0.5s ease-in-out;
      }
      @keyframes wiggle {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
      }
      .pop {
        animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      @keyframes pop {
        0% { transform: scale(0.8); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
    </style>

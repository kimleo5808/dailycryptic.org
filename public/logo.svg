<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="96" fill="#1e293b"/>
  <g transform="translate(96, 96)">
    <!-- 4 connected squares representing the 4 Connections groups -->
    <!-- Yellow (top-left) -->
    <rect x="16" y="16" width="136" height="136" rx="24" fill="#facc15"/>
    <!-- Green (top-right) -->
    <rect x="168" y="16" width="136" height="136" rx="24" fill="#10b981"/>
    <!-- Blue (bottom-left) -->
    <rect x="16" y="168" width="136" height="136" rx="24" fill="#3b82f6"/>
    <!-- Purple (bottom-right) -->
    <rect x="168" y="168" width="136" height="136" rx="24" fill="#8b5cf6"/>
    <!-- Connection lines between squares -->
    <line x1="152" y1="84" x2="168" y2="84" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <line x1="152" y1="236" x2="168" y2="236" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <line x1="84" y1="152" x2="84" y2="168" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <line x1="236" y1="152" x2="236" y2="168" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <!-- Center connection dot -->
    <circle cx="160" cy="160" r="14" fill="white"/>
  </g>
</svg>
